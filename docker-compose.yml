# App only — same `web` network as jwilder/nginx-proxy + letsencrypt-companion on the host.
# .env: APP_HOST, LETSENCRYPT_EMAIL, SURVEY_HMAC_SECRET — then: docker compose up -d --build

services:
  rocket-game:
    build: .
    environment:
      - VIRTUAL_HOST=${APP_HOST}
      - LETSENCRYPT_HOST=${APP_HOST}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - VIRTUAL_PORT=3000
      - PORT=3000
      - SURVEY_HMAC_SECRET=${SURVEY_HMAC_SECRET}
    volumes:
      - ./data:/app/data
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    external: true
