<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-labelledby="t">
  <title id="t">Flow: start, stop at 10 seconds, scan QR</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
  <!-- Step 1 -->
  <rect x="20" y="40" width="160" height="120" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <circle cx="100" cy="95" r="28" fill="#0ea5e9" opacity="0.3"/>
  <path d="M100 78 V112 M86 95 H114" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
  <text x="100" y="155" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">1 À Start</text>
  <!-- Arrow -->
  <line x1="190" y1="100" x2="230" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 2 -->
  <rect x="240" y="40" width="160" height="120" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <circle cx="320" cy="95" r="32" fill="#b91c1c"/>
  <circle cx="320" cy="95" r="22" fill="#ef4444"/>
  <text x="320" y="155" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">2 À Stop ~10s</text>
  <!-- Arrow -->
  <line x1="410" y1="100" x2="450" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 3 -->
  <rect x="460" y="40" width="160" height="120" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="500" y="65" width="80" height="80" fill="#f8fafc"/>
  <rect x="510" y="75" width="25" height="25" fill="#0f172a"/>
  <rect x="545" y="75" width="25" height="25" fill="#0f172a"/>
  <rect x="510" y="110" width="25" height="25" fill="#0f172a"/>
  <rect x="545" y="110" width="8" height="8" fill="#0f172a"/>
  <rect x="557" y="110" width="8" height="8" fill="#0f172a"/>
  <rect x="545" y="122" width="8" height="8" fill="#0f172a"/>
  <rect x="557" y="122" width="8" height="8" fill="#0f172a"/>
  <text x="580" y="155" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">3 À Scan QR</text>
  <!-- Arrow -->
  <line x1="630" y1="100" x2="670" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 4 -->
  <rect x="680" y="40" width="100" height="120" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="730" y="95" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12">Name</text>
  <rect x="695" y="102" width="70" height="8" rx="2" fill="#334155"/>
  <text x="730" y="128" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12">Email</text>
  <rect x="695" y="135" width="70" height="8" rx="2" fill="#334155"/>
  <text x="730" y="158" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">+ leaderboard</text>
</svg>
