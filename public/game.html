<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>10 Sekunden Challenge — Salesfive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/rocket-theme.css" />
    <link rel="stylesheet" href="/css/rocket-bg.css" />
    <link rel="stylesheet" href="/css/rocket.css" />
  </head>
  <body class="game-page">
    <div class="app-bg" aria-hidden="true">
      <img src="/content/images/bg-mesh.svg" alt="" />
    </div>
    <div class="shell" id="app-root" tabindex="-1">
      <header class="brand">
        <img
          src="/content/logos/Salesfive-logo-rgb-full-white.svg"
          alt="Salesfive"
          width="254"
          height="40"
        />
        <div>
          <h1>10 Sekunden Challenge</h1>
          <p>Exakt 10 Sekunden treffen — Timer läuft unsichtbar</p>
        </div>
      </header>

      <div class="layout">
        <main class="game-main">
          <div class="game-panels">
            <section
              class="panel game-panel game-panel--play"
              aria-labelledby="game-panel-play-title"
            >
              <h2 id="game-panel-play-title" class="sr-only">Spiel</h2>
              <div class="game-stage" id="game-stage">
                <div id="game-rocket-wrap" class="game-rocket-wrap" aria-hidden="true"></div>
              </div>
            </section>

            <section
              class="panel game-panel game-panel--controls"
              id="game-panel-controls"
              aria-labelledby="game-panel-controls-title"
              aria-live="polite"
            >
              <h2 id="game-panel-controls-title" class="sr-only">Start und Stopp</h2>
              <p class="state-hint" id="state-hint"></p>
              <div class="buzzer-wrap">
                <button type="button" class="buzzer-btn" id="buzzer-btn" aria-label="Starten">
                  <img
                    class="buzzer-icon"
                    src="/content/images/icon-buzzer.svg"
                    alt=""
                    width="112"
                    height="112"
                  />
                  <span class="buzzer-label" id="buzzer-label">START</span>
                </button>
              </div>
            </section>

            <section
              class="panel game-panel game-panel--result"
              id="game-panel-result"
              hidden
              aria-labelledby="game-panel-result-title"
            >
              <h2 id="game-panel-result-title" class="sr-only">Ergebnis</h2>
              <div id="result-block">
                <p class="result-big" id="result-delta"></p>
                <p class="result-sub" id="result-elapsed"></p>
                <p class="game-rocket-caption" id="game-rocket-caption" hidden></p>
                <div class="qr-block" id="qr-block" hidden>
                  <div id="qr-host"></div>
                  <p class="survey-caption-wrap">
                    <a class="survey-caption" id="survey-link" href="#" hidden>Zum Formular</a>
                  </p>
                  <details class="survey-url-details" id="survey-url-details" hidden>
                    <summary>Link anzeigen</summary>
                    <p class="survey-url" id="survey-url-full"></p>
                  </details>
                  <p class="survey-error" id="survey-error" hidden></p>
                </div>
                <div class="actions">
                  <button type="button" class="btn-secondary" id="btn-again">
                    Nochmal spielen
                  </button>
                </div>
              </div>
            </section>
          </div>
        </main>

        <aside class="panel leaderboard" id="leaderboard-panel">
          <h2 class="leaderboard-heading">Bestenlisten</h2>
          <div class="leaderboard-tabs">
            <div
              class="leaderboard-tablist"
              role="tablist"
              aria-label="Bestenliste"
            >
              <button
                type="button"
                class="leaderboard-tab"
                role="tab"
                id="lb-tab-all"
                aria-selected="true"
                aria-controls="lb-panel-all"
                tabindex="0"
              >
                Gesamt
              </button>
              <button
                type="button"
                class="leaderboard-tab"
                role="tab"
                id="lb-tab-day"
                aria-selected="false"
                aria-controls="lb-panel-day"
                tabindex="-1"
              >
                Tag
              </button>
              <button
                type="button"
                class="leaderboard-tab"
                role="tab"
                id="lb-tab-week"
                aria-selected="false"
                aria-controls="lb-panel-week"
                tabindex="-1"
              >
                Woche
              </button>
            </div>
            <div class="leaderboard-tabpanels">
              <div
                class="leaderboard-tabpanel"
                role="tabpanel"
                id="lb-panel-all"
                aria-labelledby="lb-tab-all"
              >
                <p class="leaderboard-empty" id="leaderboard-empty-all">
                  Noch keine Einträge.
                </p>
                <ol id="leaderboard-list-all" class="leaderboard-list" hidden></ol>
              </div>
              <div
                class="leaderboard-tabpanel"
                role="tabpanel"
                id="lb-panel-day"
                aria-labelledby="lb-tab-day"
                hidden
              >
                <p class="leaderboard-empty" id="leaderboard-empty-day">
                  Heute noch keine Einträge.
                </p>
                <ol id="leaderboard-list-day" class="leaderboard-list" hidden></ol>
              </div>
              <div
                class="leaderboard-tabpanel"
                role="tabpanel"
                id="lb-panel-week"
                aria-labelledby="lb-tab-week"
                hidden
              >
                <p class="leaderboard-empty" id="leaderboard-empty-week">
                  Diese Woche noch keine Einträge.
                </p>
                <ol id="leaderboard-list-week" class="leaderboard-list" hidden></ol>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="/js/rocket.js" defer></script>
    <script src="/js/game.js" defer></script>
  </body>
</html>
