<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teilnahme — 10 Sekunden Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div class="app-bg" aria-hidden="true">
      <img src="/content/images/bg-mesh.svg" alt="" />
    </div>
    <div class="shell">
      <header class="brand">
        <img src="/content/images/logo-placeholder.svg" alt="Salesfive" width="160" height="40" />
        <div>
          <h1>Bestenliste</h1>
          <p>Trage dich mit deinem Ergebnis ein</p>
        </div>
      </header>

      <main class="panel survey-main">
        <div class="score-banner" id="score-banner">
          <p>
            Dein Ergebnis (Abstand zu 10,000 s):
            <strong id="score-display">—</strong>
          </p>
        </div>

        <form id="survey-form" novalidate>
          <input type="hidden" name="score_ms" id="field-score" />
          <input type="hidden" name="elapsed_ms" id="field-elapsed" />

          <div class="form-group">
            <label for="field-name">Name</label>
            <input id="field-name" name="name" type="text" required maxlength="200" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="field-email">E-Mail</label>
            <input
              id="field-email"
              name="email"
              type="email"
              required
              maxlength="320"
              autocomplete="email"
            />
          </div>
          <div class="form-group">
            <label for="field-nickname">Nickname (in der Bestenliste)</label>
            <input
              id="field-nickname"
              name="nickname"
              type="text"
              maxlength="100"
              autocomplete="nickname"
            />
          </div>

          <button type="submit" class="btn-primary" id="btn-submit">Senden</button>
          <p class="msg-error" id="msg-error" hidden></p>
          <p class="msg-success" id="msg-success" hidden></p>
        </form>

        <p class="form-footnote">
          Mit dem Absenden erklärst du dich mit der Verarbeitung deiner Daten einverstanden.
          <a href="https://www.salesfive.com/en/privacy-policy" rel="noopener noreferrer"
            >Datenschutz (Salesfive)</a
          >
        </p>
      </main>
    </div>
    <script type="module" src="/js/survey.js"></script>
  </body>
</html>
