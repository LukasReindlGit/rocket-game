<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Teilnahme — 10 Sekunden Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body class="survey-page">
    <div class="app-bg" aria-hidden="true">
      <img src="/content/images/bg-mesh.svg" alt="" />
    </div>
    <div class="shell">
      <header class="brand brand--survey">
        <img
          src="/content/logos/Salesfive-logo-rgb-full-white.svg"
          alt="Salesfive"
          width="254"
          height="40"
        />
        <div class="brand__titles">
          <h1>Eintragen</h1>
          <p>Für die Bestenliste</p>
        </div>
      </header>

      <main class="panel survey-main" id="survey-main">
        <div class="score-banner" id="score-banner">
          <p>
            Abstand zu 10&nbsp;s:
            <strong id="score-display">—</strong>
          </p>
        </div>

        <form id="survey-form" class="survey-form" novalidate>
          <input type="hidden" id="field-token" />

          <div class="form-group">
            <label for="field-nickname">Nickname (Bestenliste)</label>
            <input
              id="field-nickname"
              name="nickname"
              type="text"
              required
              maxlength="40"
              autocomplete="nickname"
              enterkeyhint="next"
            />
          </div>
          <div class="form-group">
            <label for="field-vorname">Vorname</label>
            <input
              id="field-vorname"
              name="vorname"
              type="text"
              required
              maxlength="120"
              autocomplete="given-name"
              enterkeyhint="next"
            />
          </div>
          <div class="form-group">
            <label for="field-nachname">Nachname</label>
            <input
              id="field-nachname"
              name="nachname"
              type="text"
              required
              maxlength="120"
              autocomplete="family-name"
              enterkeyhint="next"
            />
          </div>
          <div class="form-group">
            <label for="field-company">Unternehmen</label>
            <input
              id="field-company"
              name="company"
              type="text"
              required
              maxlength="200"
              autocomplete="organization"
              enterkeyhint="next"
            />
          </div>
          <div class="form-group">
            <label for="field-email">E-Mail</label>
            <input
              id="field-email"
              name="email"
              type="email"
              required
              maxlength="320"
              autocomplete="email"
              inputmode="email"
              autocapitalize="none"
              autocorrect="off"
              enterkeyhint="done"
            />
          </div>

          <button type="submit" class="btn-primary btn-primary--survey" id="btn-submit">
            Senden
          </button>
          <p class="msg-error" id="msg-error" hidden></p>
          <p class="msg-success" id="msg-success" hidden></p>
        </form>

        <p class="form-footnote">
          Mit dem Absenden stimmst du der Datenverarbeitung zu.
          <a href="https://www.salesfive.com/en/privacy-policy" rel="noopener noreferrer"
            >Datenschutz (Salesfive)</a
          >
        </p>
      </main>
    </div>
    <script type="module" src="/js/survey.js"></script>
  </body>
</html>
