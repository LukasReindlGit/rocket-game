<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rocket — Animationen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Bangers&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/rocket-theme.css" />
    <link rel="stylesheet" href="/css/rocket-bg.css" />
    <link rel="stylesheet" href="/css/rocket.css" />
  </head>
  <body class="page-rocket">
    <div class="app-bg" aria-hidden="true"></div>

    <div class="rocket-page">
      <h1>Raketen-Animationen</h1>
      <p class="rocket-lead">
        Vorschau für Spiel-Enden: später können die gleichen Szenen per Score ausgelöst werden.
      </p>

      <div class="rocket-controls" role="group" aria-label="Animation auslösen">
        <button type="button" class="btn-great" id="btn-great">Great success!</button>
        <button type="button" class="btn-meh" id="btn-meh">Meh!</button>
        <button type="button" class="btn-fail" id="btn-fail">Failure</button>
      </div>

      <div
        class="rocket-stage-wrap rocket-stage rocket-stage--idle"
        id="rocket-stage"
      >
        <canvas id="confetti-canvas" aria-hidden="true"></canvas>
        <svg
          class="rocket-svg"
          viewBox="0 0 400 500"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <defs>
            <filter id="ink-shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="3" dy="4" stdDeviation="0" flood-color="var(--rocket-ink)" flood-opacity="1" />
            </filter>
            <!-- Idle exhaust -->
            <radialGradient id="idle-flame-rad" cx="50%" cy="0%" r="75%" fx="50%" fy="0%">
              <stop offset="0%" stop-color="var(--rocket-idle-flame-rad-0)" />
              <stop offset="35%" stop-color="var(--rocket-idle-flame-rad-35)" />
              <stop offset="70%" stop-color="var(--rocket-idle-flame-rad-70)" />
              <stop offset="100%" stop-color="var(--rocket-idle-flame-rad-100)" />
            </radialGradient>
            <linearGradient id="idle-flame-body" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--rocket-idle-flame-body-0)" />
              <stop offset="40%" stop-color="var(--rocket-idle-flame-body-40)" />
              <stop offset="100%" stop-color="var(--rocket-idle-flame-body-100)" />
            </linearGradient>
            <!-- Launch: full thrust -->
            <linearGradient id="launch-flame-outer" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--rocket-launch-flame-outer-0)" />
              <stop offset="12%" stop-color="var(--rocket-launch-flame-outer-12)" />
              <stop offset="35%" stop-color="var(--rocket-launch-flame-outer-35)" />
              <stop offset="58%" stop-color="var(--rocket-launch-flame-outer-58)" />
              <stop offset="82%" stop-color="var(--rocket-launch-flame-outer-82)" />
              <stop offset="100%" stop-color="var(--rocket-launch-flame-outer-100)" />
            </linearGradient>
            <linearGradient id="launch-flame-mid" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--rocket-launch-flame-mid-0)" />
              <stop offset="30%" stop-color="var(--rocket-launch-flame-mid-30)" />
              <stop offset="65%" stop-color="var(--rocket-launch-flame-mid-65)" />
              <stop offset="100%" stop-color="var(--rocket-launch-flame-mid-100)" />
            </linearGradient>
            <linearGradient id="launch-flame-core" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--rocket-launch-flame-core-0)" />
              <stop offset="22%" stop-color="var(--rocket-launch-flame-core-22)" />
              <stop offset="55%" stop-color="var(--rocket-launch-flame-core-55)" />
              <stop offset="100%" stop-color="var(--rocket-launch-flame-core-100)" />
            </linearGradient>
            <linearGradient id="rocket-body-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="var(--rocket-body-0)" />
              <stop offset="45%" stop-color="var(--rocket-body-45)" />
              <stop offset="100%" stop-color="var(--rocket-body-100)" />
            </linearGradient>
            <linearGradient id="rocket-nose-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--rocket-nose-0)" />
              <stop offset="100%" stop-color="var(--rocket-nose-100)" />
            </linearGradient>
          </defs>

          <!-- Layer back → front: mountains → floor (covers mountain bases) → trees on the field -->
          <!-- Distant mountains (no stroke; drawn first, behind floor) -->
          <g class="scene-mountains" aria-hidden="true">
            <path d="M -40 420 L 75 248 L 185 420 Z" fill="var(--rocket-mountain-1)" />
            <path d="M 130 420 L 215 268 L 305 420 Z" fill="var(--rocket-mountain-2)" />
            <path d="M 255 420 L 335 285 L 430 420 Z" fill="var(--rocket-mountain-3)" />
          </g>

          <!-- Trees near horizon / ridge (in front of floor strip, behind rocket) -->
          <g class="scene-trees" aria-hidden="true">

            <g transform="translate(0 420)">
              <rect x="-3" y="-1" width="6" height="22" rx="1" fill="var(--rocket-tree-trunk)" stroke="var(--rocket-ink)" stroke-width="2" />
              <path d="M 0 -8 L -22 16 L 22 16 Z" fill="var(--rocket-tree-foliage-1)" stroke="var(--rocket-ink)" stroke-width="2" stroke-linejoin="round" />
              <path d="M 0 -20 L -17 2 L 17 2 Z" fill="var(--rocket-tree-foliage-2)" stroke="var(--rocket-ink)" stroke-width="2" stroke-linejoin="round" />
            </g>
            <g transform="translate(42 400)">
              <rect x="-3" y="-1" width="6" height="22" rx="1" fill="var(--rocket-tree-trunk)" stroke="var(--rocket-ink)" stroke-width="2" />
              <path d="M 0 -8 L -22 16 L 22 16 Z" fill="var(--rocket-tree-foliage-1)" stroke="var(--rocket-ink)" stroke-width="2" stroke-linejoin="round" />
              <path d="M 0 -20 L -17 2 L 17 2 Z" fill="var(--rocket-tree-foliage-2)" stroke="var(--rocket-ink)" stroke-width="2" stroke-linejoin="round" />
            </g>
            <g transform="translate(118 398)">
              <rect x="-3" y="-1" width="6" height="22" rx="1" fill="var(--rocket-tree-trunk)" stroke="var(--rocket-ink)" stroke-width="2" />
              <path d="M 0 -8 L -22 16 L 22 16 Z" fill="var(--rocket-tree-foliage-1)" stroke="var(--rocket-ink)" stroke-width="2" stroke-linejoin="round" />
              <path d="M 0 -20 L -17 2 L 17 2 Z" fill="var(--rocket-tree-foliage-2)" stroke="var(--rocket-ink)" stroke-width="2" stroke-linejoin="round" />
            </g>
            <g transform="translate(282 396)">
              <rect x="-3" y="-1" width="6" height="22" rx="1" fill="var(--rocket-tree-trunk)" stroke="var(--rocket-ink)" stroke-width="2" />
              <path d="M 0 -8 L -22 16 L 22 16 Z" fill="var(--rocket-tree-foliage-1)" stroke="var(--rocket-ink)" stroke-width="2" stroke-linejoin="round" />
              <path d="M 0 -20 L -17 2 L 17 2 Z" fill="var(--rocket-tree-foliage-2)" stroke="var(--rocket-ink)" stroke-width="2" stroke-linejoin="round" />
            </g>
            <g transform="translate(348 406)">
              <rect x="-3" y="-1" width="6" height="22" rx="1" fill="var(--rocket-tree-trunk)" stroke="var(--rocket-ink)" stroke-width="2" />
              <path d="M 0 -8 L -22 16 L 22 16 Z" fill="var(--rocket-tree-foliage-1)" stroke="var(--rocket-ink)" stroke-width="2" stroke-linejoin="round" />
              <path d="M 0 -20 L -17 2 L 17 2 Z" fill="var(--rocket-tree-foliage-2)" stroke="var(--rocket-ink)" stroke-width="2" stroke-linejoin="round" />
            </g>
          </g>

          <!-- Ground: launchpad ellipses (in front of mountains) -->
          <ellipse cx="200" cy="448" rx="168" ry="34" fill="var(--rocket-launchpad-outer)" stroke="var(--rocket-ink)" stroke-width="4" />
          <ellipse cx="200" cy="442" rx="148" ry="12" fill="var(--rocket-launchpad-inner)" stroke="var(--rocket-ink)" stroke-width="3" />


          <!-- Fumes (idle + shared); y aligned with exhaust under rocket anchor -->
          <g class="fumes" transform="translate(200 418)">
            <ellipse
              class="fume-puff"
              cx="-32"
              cy="28"
              rx="28"
              ry="18"
              fill="var(--rocket-fume-1)"
              stroke="var(--rocket-ink)"
              stroke-width="3"
            />
            <ellipse
              class="fume-puff"
              cx="0"
              cy="38"
              rx="34"
              ry="22"
              fill="var(--rocket-fume-2)"
              stroke="var(--rocket-ink)"
              stroke-width="3"
            />
            <ellipse
              class="fume-puff"
              cx="36"
              cy="26"
              rx="26"
              ry="16"
              fill="var(--rocket-fume-3)"
              stroke="var(--rocket-ink)"
              stroke-width="3"
            />
          </g>

          <!-- Failure smoke burst; outer g fixes world position (CSS scale must not replace translate) -->
          <g transform="translate(200 428)">
            <g class="fail-burst" opacity="0" visibility="hidden">
              <ellipse cx="-40" cy="10" rx="45" ry="35" fill="var(--rocket-fail-smoke-1)" stroke="var(--rocket-ink)" stroke-width="3" />
              <ellipse cx="20" cy="-5" rx="50" ry="40" fill="var(--rocket-fail-smoke-2)" stroke="var(--rocket-ink)" stroke-width="3" />
              <ellipse cx="-10" cy="25" rx="38" ry="28" fill="var(--rocket-fail-smoke-3)" stroke="var(--rocket-ink)" stroke-width="3" />
              <text
                x="0"
                y="-35"
                text-anchor="middle"
                font-family="Bangers, system-ui"
                font-size="36"
                fill="var(--rocket-fail-text-fill)"
                stroke="var(--rocket-fail-text-stroke)"
                stroke-width="4"
                paint-order="stroke fill"
              >
                POW!
              </text>
            </g>
          </g>

          <!-- Rocket: outer g holds screen position; CSS transform on .rocket-group would override SVG translate, so motion is only on the inner group -->
          <g transform="translate(200 378)">
          <g class="rocket-group">
            <!-- Meh sweat -->
            <path
              class="meh-sweat"
              d="M38 -55 Q44 -48 38 -40"
              fill="none"
              stroke="var(--rocket-meh-sweat)"
              stroke-width="4"
              stroke-linecap="round"
              opacity="0"
              visibility="hidden"
            />

            <!-- Fins -->
            <path
              d="M-42 25 L-58 62 L-32 52 Z"
              fill="var(--rocket-fin)"
              stroke="var(--rocket-ink)"
              stroke-width="4"
              stroke-linejoin="round"
            />
            <path
              d="M42 25 L58 62 L32 52 Z"
              fill="var(--rocket-fin)"
              stroke="var(--rocket-ink)"
              stroke-width="4"
              stroke-linejoin="round"
            />

            <!-- Body -->
            <path
              d="M-38 52 L-32 -48 Q0 -78 32 -48 L38 52 Q0 62 -38 52 Z"
              fill="url(#rocket-body-grad)"
              stroke="var(--rocket-ink)"
              stroke-width="4"
              stroke-linejoin="round"
              filter="url(#ink-shadow)"
            />
            <!-- Stripe -->
            <path d="M-34 8 L34 8" stroke="var(--rocket-stripe-1)" stroke-width="5" stroke-linecap="round" />
            <path d="M-34 22 L34 22" stroke="var(--rocket-stripe-2)" stroke-width="5" stroke-linecap="round" />

            <!-- Window -->
            <circle cx="0" cy="-18" r="22" fill="var(--rocket-window)" stroke="var(--rocket-ink)" stroke-width="4" />
            <circle cx="6" cy="-24" r="8" fill="var(--rocket-window-glare)" />

            <!-- Crack lines (failure) -->
            <g class="crack-lines" opacity="0">
              <path
                d="M-12 -25 L2 5 L-8 18"
                fill="none"
                stroke="var(--rocket-ink)"
                stroke-width="3"
                stroke-linecap="round"
              />
              <path d="M10 -10 L22 8" fill="none" stroke="var(--rocket-ink)" stroke-width="3" stroke-linecap="round" />
            </g>

            <!-- Nose -->
            <path
              d="M-32 -48 Q0 -95 32 -48"
              fill="url(#rocket-nose-grad)"
              stroke="var(--rocket-ink)"
              stroke-width="4"
              stroke-linejoin="round"
            />

            <!-- Idle exhaust: wisps + main plume + hot core (outer g keeps y) -->
            <g transform="translate(0 58)">
              <g class="idle-flame">
                <path
                  class="idle-flame-wisp idle-flame-wisp-l"
                  d="M -9 2 C -22 14 -28 32 -20 44 C -14 50 -6 46 0 40 C -4 24 -8 12 -9 2 Z"
                  fill="url(#idle-flame-rad)"
                  stroke="var(--rocket-ink)"
                  stroke-width="2.5"
                  stroke-linejoin="round"
                />
                <path
                  class="idle-flame-wisp idle-flame-wisp-r"
                  d="M 9 2 C 22 14 28 32 20 44 C 14 50 6 46 0 40 C 4 24 8 12 9 2 Z"
                  fill="url(#idle-flame-rad)"
                  stroke="var(--rocket-ink)"
                  stroke-width="2.5"
                  stroke-linejoin="round"
                />
                <path
                  class="idle-flame-main"
                  d="M 0 0 C -16 8 -22 26 -18 42 C -12 50 12 50 18 42 C 22 26 16 8 0 0 Z"
                  fill="url(#idle-flame-body)"
                  stroke="var(--rocket-ink)"
                  stroke-width="3"
                  stroke-linejoin="round"
                />
                <path
                  class="idle-flame-core"
                  d="M 0 3 C -9 14 -11 30 -8 40 C -4 44 4 44 8 40 C 11 30 9 14 0 3 Z"
                  fill="var(--rocket-idle-flame-core-fill)"
                  stroke="var(--rocket-ink)"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
                <path
                  class="idle-flame-spark"
                  d="M -5 22 L -3 28 M 4 18 L 6 26 M 0 32 L 1 38"
                  fill="none"
                  stroke="var(--rocket-idle-flame-spark)"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  opacity="0.9"
                />
              </g>
            </g>

            <!-- Launch: layered plume + side jets + core (inner g gets scale animation) -->
            <g transform="translate(0 58)">
              <g class="launch-flame" opacity="0" visibility="hidden">
                <path
                  class="launch-flame-outer"
                  d="M 0 0 C -34 14 -46 52 -40 78 C -36 100 -18 114 -6 118 C 0 120 6 118 22 114 C 40 100 44 78 40 78 C 48 52 36 14 0 0 Z"
                  fill="url(#launch-flame-outer)"
                  stroke="var(--rocket-ink)"
                  stroke-width="3.5"
                  stroke-linejoin="round"
                />
                <path
                  class="launch-flame-mid"
                  d="M 0 5 C -26 18 -34 54 -30 76 C -26 94 -12 104 -4 106 C 0 108 4 106 16 104 C 28 94 32 76 30 76 C 36 54 28 18 0 5 Z"
                  fill="url(#launch-flame-mid)"
                  stroke="var(--rocket-ink)"
                  stroke-width="2.5"
                  stroke-linejoin="round"
                />
                <path
                  class="launch-flame-jet launch-flame-jet-l"
                  d="M -20 10 C -38 34 -42 62 -34 84 C -28 94 -18 98 -10 92"
                  fill="none"
                  stroke="var(--rocket-launch-flame-jet)"
                  stroke-width="14"
                  stroke-linecap="round"
                  opacity="0.88"
                />
                <path
                  class="launch-flame-jet launch-flame-jet-r"
                  d="M 20 10 C 38 34 42 62 34 84 C 28 94 18 98 10 92"
                  fill="none"
                  stroke="var(--rocket-launch-flame-jet)"
                  stroke-width="14"
                  stroke-linecap="round"
                  opacity="0.88"
                />
                <path
                  class="launch-flame-core"
                  d="M 0 8 C -12 32 -14 64 -10 88 C -6 98 0 102 6 98 C 10 88 14 32 0 8 Z"
                  fill="url(#launch-flame-core)"
                  stroke="var(--rocket-ink)"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
                <path
                  class="launch-flame-hot"
                  d="M 0 12 C -5 40 -5 72 0 96 C 5 72 5 40 0 12 Z"
                  fill="var(--rocket-launch-flame-hot)"
                  opacity="0.82"
                />
                <path
                  class="launch-flame-tongue"
                  d="M -8 18 C -18 38 -16 58 -8 72 M 8 18 C 18 38 16 58 8 72"
                  fill="none"
                  stroke="var(--rocket-launch-flame-tongue)"
                  stroke-width="4"
                  stroke-linecap="round"
                  opacity="0.75"
                />
              </g>
            </g>
          </g>
          </g>
        </svg>
      </div>

      <p class="rocket-status" id="rocket-status" aria-live="polite"></p>

      <div class="rocket-api-hint">
        Für später im Spiel: <code>window.playRocketScenario(&quot;great&quot;)</code>,
        <code>&quot;meh&quot;</code> oder <code>&quot;fail&quot;</code> — gleiche Animationen wie die Buttons.
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="/js/rocket.js" defer></script>
  </body>
</html>
