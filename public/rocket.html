<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rocket — Animationen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Bangers&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/rocket-theme.css" />
    <link rel="stylesheet" href="/css/rocket-bg.css" />
    <link rel="stylesheet" href="/css/rocket.css" />
  </head>
  <body class="page-rocket">
    <div class="app-bg" aria-hidden="true"></div>

    <div class="rocket-page">
      <h1>Raketen-Animationen</h1>
      <p class="rocket-lead">
        Vorschau für Spiel-Enden: später können die gleichen Szenen per Score ausgelöst werden.
      </p>

      <div class="rocket-controls" role="group" aria-label="Animation auslösen">
        <button type="button" class="btn-great" id="btn-great">Great success!</button>
        <button type="button" class="btn-meh" id="btn-meh">Meh!</button>
        <button type="button" class="btn-fail" id="btn-fail">Failure</button>
      </div>

      <div id="rocket-stage-root"></div>


      <p class="rocket-status" id="rocket-status" aria-live="polite"></p>

      <div class="rocket-api-hint">
        Auf der Spielseite werden dieselben Szenen automatisch per Punktzahl ausgelöst (siehe
        <code>ROCKET_SCORE_RULES</code> in <code>game.js</code>). Hier:
        <code>playRocketScenario(&quot;great&quot;)</code>, <code>&quot;meh&quot;</code>,
        <code>&quot;fail&quot;</code>.
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="/js/rocket.js" defer></script>
    <script src="/js/rocket-page.js" defer></script>
  </body>
</html>
