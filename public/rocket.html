<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rocket — Animationen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Bangers&family=Outfit:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/rocket.css" />
  </head>
  <body>
    <div class="app-bg" aria-hidden="true">
      <img src="/content/images/bg-mesh.svg" alt="" />
    </div>

    <div class="rocket-page">
      <h1>Raketen-Animationen</h1>
      <p class="rocket-lead">
        Vorschau für Spiel-Enden: später können die gleichen Szenen per Score ausgelöst werden.
      </p>

      <div class="rocket-controls" role="group" aria-label="Animation auslösen">
        <button type="button" class="btn-great" id="btn-great">Great success!</button>
        <button type="button" class="btn-meh" id="btn-meh">Meh!</button>
        <button type="button" class="btn-fail" id="btn-fail">Failure</button>
      </div>

      <div
        class="rocket-stage-wrap rocket-stage rocket-stage--idle"
        id="rocket-stage"
      >
        <canvas id="confetti-canvas" aria-hidden="true"></canvas>
        <svg
          class="rocket-svg"
          viewBox="0 0 400 500"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <defs>
            <filter id="ink-shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="3" dy="4" stdDeviation="0" flood-color="#0f172a" flood-opacity="1" />
            </filter>
            <linearGradient id="flame-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fef08a" />
              <stop offset="45%" stop-color="#f97316" />
              <stop offset="100%" stop-color="#ea580c" />
            </linearGradient>
          </defs>

          <!-- Ground -->
          <ellipse cx="200" cy="458" rx="160" ry="18" fill="#f97316" stroke="#0f172a" stroke-width="4" />
          <ellipse cx="200" cy="452" rx="140" ry="10" fill="#fb923c" stroke="#0f172a" stroke-width="3" />

          <!-- Star burst (success); outer g keeps position so inner CSS transform does not wipe translate -->
          <g transform="translate(200 42)">
            <g class="star-burst" opacity="0">
              <path
                d="M0 -28 L6 -8 L26 -8 L10 4 L16 24 L0 12 L-16 24 L-10 4 L-26 -8 L-6 -8 Z"
                fill="#fde047"
                stroke="#0f172a"
                stroke-width="3"
                filter="url(#ink-shadow)"
              />
              <circle cx="0" cy="0" r="10" fill="#fef08a" stroke="#0f172a" stroke-width="3" />
            </g>
          </g>

          <!-- Fumes (idle + shared); y aligned with exhaust under rocket anchor -->
          <g class="fumes" transform="translate(200 418)">
            <ellipse
              class="fume-puff"
              cx="-32"
              cy="28"
              rx="28"
              ry="18"
              fill="#cbd5e1"
              stroke="#0f172a"
              stroke-width="3"
            />
            <ellipse
              class="fume-puff"
              cx="0"
              cy="38"
              rx="34"
              ry="22"
              fill="#e2e8f0"
              stroke="#0f172a"
              stroke-width="3"
            />
            <ellipse
              class="fume-puff"
              cx="36"
              cy="26"
              rx="26"
              ry="16"
              fill="#94a3b8"
              stroke="#0f172a"
              stroke-width="3"
            />
          </g>

          <!-- Failure smoke burst; outer g fixes world position (CSS scale must not replace translate) -->
          <g transform="translate(200 428)">
            <g class="fail-burst" opacity="0" visibility="hidden">
              <ellipse cx="-40" cy="10" rx="45" ry="35" fill="#64748b" stroke="#0f172a" stroke-width="3" />
              <ellipse cx="20" cy="-5" rx="50" ry="40" fill="#94a3b8" stroke="#0f172a" stroke-width="3" />
              <ellipse cx="-10" cy="25" rx="38" ry="28" fill="#475569" stroke="#0f172a" stroke-width="3" />
              <text
                x="0"
                y="-35"
                text-anchor="middle"
                font-family="Bangers, system-ui"
                font-size="36"
                fill="#0f172a"
                stroke="#fff"
                stroke-width="4"
                paint-order="stroke fill"
              >
                POW!
              </text>
            </g>
          </g>

          <!-- Rocket: outer g holds screen position; CSS transform on .rocket-group would override SVG translate, so motion is only on the inner group -->
          <g transform="translate(200 378)">
          <g class="rocket-group">
            <!-- Meh sweat -->
            <path
              class="meh-sweat"
              d="M38 -55 Q44 -48 38 -40"
              fill="none"
              stroke="#38bdf8"
              stroke-width="4"
              stroke-linecap="round"
              opacity="0"
              visibility="hidden"
            />

            <!-- Fins -->
            <path
              d="M-42 25 L-58 62 L-32 52 Z"
              fill="#c1121f"
              stroke="#0f172a"
              stroke-width="4"
              stroke-linejoin="round"
            />
            <path
              d="M42 25 L58 62 L32 52 Z"
              fill="#c1121f"
              stroke="#0f172a"
              stroke-width="4"
              stroke-linejoin="round"
            />

            <!-- Body -->
            <path
              d="M-38 52 L-32 -48 Q0 -78 32 -48 L38 52 Q0 62 -38 52 Z"
              fill="#e63946"
              stroke="#0f172a"
              stroke-width="4"
              stroke-linejoin="round"
              filter="url(#ink-shadow)"
            />
            <!-- Stripe -->
            <path d="M-34 8 L34 8" stroke="#0f172a" stroke-width="5" stroke-linecap="round" />
            <path d="M-34 22 L34 22" stroke="#0f172a" stroke-width="5" stroke-linecap="round" />

            <!-- Window -->
            <circle cx="0" cy="-18" r="22" fill="#38bdf8" stroke="#0f172a" stroke-width="4" />
            <circle cx="6" cy="-24" r="8" fill="rgba(255,255,255,0.5)" />

            <!-- Crack lines (failure) -->
            <g class="crack-lines" opacity="0">
              <path
                d="M-12 -25 L2 5 L-8 18"
                fill="none"
                stroke="#0f172a"
                stroke-width="3"
                stroke-linecap="round"
              />
              <path d="M10 -10 L22 8" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round" />
            </g>

            <!-- Nose -->
            <path
              d="M-32 -48 Q0 -95 32 -48"
              fill="#ff6b6b"
              stroke="#0f172a"
              stroke-width="4"
              stroke-linejoin="round"
            />

            <!-- Idle small flame (outer g keeps y; CSS never overrides this translate) -->
            <g transform="translate(0 58)">
              <g class="idle-flame">
                <path
                  d="M0 0 L-14 38 L0 32 L14 38 Z"
                  fill="#fdba74"
                  stroke="#0f172a"
                  stroke-width="3"
                  stroke-linejoin="round"
                />
              </g>
            </g>

            <!-- Launch flame (success); inner g gets scale animation -->
            <g transform="translate(0 58)">
              <g class="launch-flame" opacity="0" visibility="hidden">
                <path
                  d="M0 0 L-22 72 L0 58 L22 72 Z"
                  fill="url(#flame-grad)"
                  stroke="#0f172a"
                  stroke-width="3"
                  stroke-linejoin="round"
                />
                <path
                  d="M0 10 L-12 52 L0 46 L12 52 Z"
                  fill="#fef08a"
                  stroke="#0f172a"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
              </g>
            </g>
          </g>
          </g>
        </svg>
      </div>

      <p class="rocket-status" id="rocket-status" aria-live="polite"></p>

      <div class="rocket-api-hint">
        Für später im Spiel: <code>window.playRocketScenario(&quot;great&quot;)</code>,
        <code>&quot;meh&quot;</code> oder <code>&quot;fail&quot;</code> — gleiche Animationen wie die Buttons.
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="/js/rocket.js" defer></script>
  </body>
</html>
